services:
  - type: web
    name: pulsepair-chat
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CSRF_TRUSTED_ORIGINS
        value: ""
      - key: APP_PREFIX
        value: e2e_chat
      - key: USE_REDIS
        value: False
      - key: REDIS_URL
        value: redis://127.0.0.1:6379/0
      - key: SECRET_KEY
        generateValue: true
