{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room {{ room_id }} | PulsePair</title>
  <script>
    (() => {
      try {
        const savedTheme = localStorage.getItem("pulsepair-theme");
        if (savedTheme === "dark") {
          document.documentElement.dataset.theme = "dark";
        }
      } catch (_error) {
        // no-op
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'chatcore/css/app.css' %}">
</head>
<body class="app-bg min-h-screen">
  <div class="ambient-shape ambient-shape-a"></div>
  <div class="ambient-shape ambient-shape-b"></div>

  <main class="chat-shell mx-auto flex min-h-screen w-full flex-col px-4 pt-4 pb-4">
    <header class="chat-header reveal-up">
      <div class="room-top-row">
        <div class="room-top-left">
          <a href="{% url 'lobby' %}" class="ghost-link">Back</a>
          <a href="{% url 'chat_home' %}" class="btn-secondary btn-link-like">Private Chat</a>
          <button id="inviteWhatsappBtn" type="button" class="btn-secondary btn-invite-compact">Invite WhatsApp</button>
        </div>
        <div class="room-top-right">
          <span class="status-dot" id="roomStatusPill">Connecting</span>
          <button id="themeToggleBtn" type="button" class="theme-toggle-btn" aria-label="Toggle dark mode">Dark</button>
        </div>
      </div>
      <div class="mt-3 flex items-start justify-between gap-3">
        <div>
          <p class="eyebrow">Secure Room</p>
          <h1 class="brand-title mt-1">{{ room_id }}</h1>
        </div>
      </div>

      <div class="discoverable-box mt-3 rounded-2xl p-3">
        <label class="flex items-center justify-between gap-3">
          <span class="meta-text discoverable-text">Keep room discoverable when one participant remains</span>
          <input id="discoverableToggle" type="checkbox" class="h-5 w-5 accent-[#86b416]" checked>
        </label>
      </div>
    </header>

    <section class="surface-card mt-3 reveal-up" style="animation-delay:.05s">
      <h2 class="section-title">Participants</h2>
      <div id="participants" class="mt-2 flex flex-wrap gap-2"></div>
    </section>

    <section id="joinRequestsPanel" class="surface-card mt-3 hidden reveal-up" style="animation-delay:.08s">
      <h2 class="section-title">Join Requests</h2>
      <div id="joinRequests" class="mt-2 space-y-2"></div>
    </section>

    <section class="chat-panel mt-3 flex min-h-0 flex-1 flex-col reveal-up" style="animation-delay:.12s">
      <div id="messages" class="chat-stream mb-3 flex-1 space-y-2 overflow-y-auto"></div>
      <p id="typingIndicator" class="typing-line"></p>

      <form id="composer" class="composer-wrap mt-auto">
        <div id="replyPreview" class="reply-preview hidden">
          <div class="flex items-start justify-between gap-2">
            <div>
              <p id="replyToName" class="reply-name"></p>
              <p id="replyToBody" class="reply-body"></p>
            </div>
            <button id="cancelReplyBtn" type="button" class="ghost-link !text-xs">Cancel</button>
          </div>
        </div>

        <div class="composer-row">
          <button id="openImageComposerBtn" class="btn-secondary btn-image-launch" type="button">Image</button>
          <textarea
            id="messageInput"
            rows="1"
            maxlength="2000"
            class="input-main composer-input"
            placeholder="Type a message"
            required
          ></textarea>
          <button class="btn-primary btn-send" type="submit">
            <span class="btn-main">Send</span>
          </button>
        </div>
      </form>
    </section>
  </main>

  <div id="imageComposerModal" class="image-compose-modal hidden" role="dialog" aria-modal="true" aria-labelledby="imageComposerTitle">
    <div class="image-compose-shell">
      <div class="image-compose-head">
        <div>
          <p id="imageComposerTitle" class="section-title">Send One-Time Image</p>
          <p class="meta-text">Upload up to 5MB</p>
        </div>
        <button id="closeImageComposerBtn" type="button" class="btn-secondary image-close-btn">Close</button>
      </div>

      <input id="imageInput" type="file" accept="image/*" class="hidden">
      <button id="imagePickerBtn" class="btn-secondary image-tool-btn w-full" type="button">Choose Image</button>
      <p id="selectedImageMeta" class="selected-image-meta"></p>

      <div class="image-compose-grid">
        <label class="image-mode-wrap">
          <span class="image-mode-label">Mode</span>
          <select id="imageModeSelect" class="image-mode-select">
            <option value="one_time_seen">One Time Seen</option>
            <option value="timed_one_time_seen">Timed One Time Seen</option>
          </select>
        </label>
        <label id="imageSecondsWrap" class="image-seconds-wrap hidden">
          <span class="image-mode-label">Seconds</span>
          <input id="imageSecondsInput" type="number" min="1" max="60" value="12" class="image-seconds-input">
        </label>
      </div>

      <button id="sendImageBtn" class="btn-primary image-send-btn w-full" type="button">
        <span class="btn-main">Send Image</span>
      </button>
    </div>
  </div>

  <div id="oneTimeImageModal" class="image-view-modal hidden" role="dialog" aria-modal="true" aria-labelledby="oneTimeImageTitle">
    <div class="image-view-shell">
      <div class="image-view-head">
        <div>
          <p id="oneTimeImageTitle" class="image-view-title">One-time image</p>
          <p id="oneTimeImageTimer" class="image-view-timer"></p>
        </div>
        <button id="closeOneTimeImageBtn" type="button" class="btn-secondary image-close-btn">Close</button>
      </div>
      <img id="oneTimeImageView" class="image-view-img" alt="One-time image">
    </div>
  </div>

  <script>
    window.CHAT_BOOTSTRAP = {
      roomId: "{{ room_id }}",
      userId: "{{ user_id }}",
      userName: "{{ user_name|escapejs }}"
    };
  </script>
  <script src="{% static 'chatcore/js/theme.js' %}"></script>
  <script src="{% static 'chatcore/js/room.js' %}"></script>
</body>
</html>
