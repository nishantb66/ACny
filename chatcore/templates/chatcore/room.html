{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room {{ room_id }} | PulsePair</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'chatcore/css/app.css' %}">
</head>
<body class="app-bg text-slate-900 min-h-screen">
  <div class="ambient-shape ambient-shape-a"></div>
  <div class="ambient-shape ambient-shape-b"></div>

  <main class="chat-shell mx-auto flex min-h-screen w-full max-w-md flex-col px-4 pt-4 pb-4">
    <header class="chat-header reveal-up">
      <div class="flex items-center justify-between gap-2">
        <a href="/" class="ghost-link">Back</a>
        <span class="status-dot" id="roomStatusPill">Connecting</span>
      </div>
      <div class="mt-3 flex items-start justify-between gap-3">
        <div>
          <p class="eyebrow">Secure Room</p>
          <h1 class="brand-title mt-1">{{ room_id }}</h1>
        </div>
      </div>

      <div class="mt-3 rounded-2xl border border-[#d9e94b]/55 bg-white/80 p-3">
        <label class="flex items-center justify-between gap-3">
          <span class="meta-text !text-[12px] !text-slate-700">Keep room discoverable when one participant remains</span>
          <input id="discoverableToggle" type="checkbox" class="h-5 w-5 accent-[#86b416]" checked>
        </label>
      </div>
    </header>

    <section class="surface-card mt-3 reveal-up" style="animation-delay:.05s">
      <h2 class="section-title">Participants</h2>
      <div id="participants" class="mt-2 flex flex-wrap gap-2"></div>
    </section>

    <section id="joinRequestsPanel" class="surface-card mt-3 hidden reveal-up" style="animation-delay:.08s">
      <h2 class="section-title">Join Requests</h2>
      <div id="joinRequests" class="mt-2 space-y-2"></div>
    </section>

    <section class="chat-panel mt-3 flex min-h-0 flex-1 flex-col reveal-up" style="animation-delay:.12s">
      <div id="messages" class="chat-stream mb-3 flex-1 space-y-2 overflow-y-auto"></div>
      <p id="typingIndicator" class="typing-line"></p>

      <form id="composer" class="composer-wrap mt-auto">
        <div id="replyPreview" class="reply-preview hidden">
          <div class="flex items-start justify-between gap-2">
            <div>
              <p id="replyToName" class="reply-name"></p>
              <p id="replyToBody" class="reply-body"></p>
            </div>
            <button id="cancelReplyBtn" type="button" class="ghost-link !text-xs">Cancel</button>
          </div>
        </div>

        <div class="composer-row">
          <textarea
            id="messageInput"
            rows="1"
            maxlength="2000"
            class="input-main composer-input"
            placeholder="Type a message"
            required
          ></textarea>
          <button class="btn-primary btn-send" type="submit">
            <span class="btn-main">Send</span>
          </button>
        </div>
      </form>
    </section>
  </main>

  <script>
    window.CHAT_BOOTSTRAP = {
      roomId: "{{ room_id }}",
      userId: "{{ user_id }}",
      userName: "{{ user_name|escapejs }}"
    };
  </script>
  <script src="{% static 'chatcore/js/room.js' %}"></script>
</body>
</html>
