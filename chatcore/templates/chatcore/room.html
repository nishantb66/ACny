{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room {{ room_id }} | PulsePair</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'chatcore/css/app.css' %}">
</head>
<body class="app-bg text-slate-900 min-h-screen">
  <main class="mx-auto flex min-h-screen w-full max-w-md flex-col px-4 pt-4 pb-5">
    <header class="glass-card mb-3">
      <div class="flex items-center justify-between gap-2">
        <a href="/" class="text-xs font-semibold uppercase tracking-[0.12em] text-slate-500">Lobby</a>
        <span class="status-pill" id="roomStatusPill">Connecting</span>
      </div>
      <h1 class="brand-title mt-2">Room {{ room_id }}</h1>
      <p class="text-xs text-slate-500">Secure, ephemeral, two-user conversation.</p>
      <div class="mt-3 rounded-xl border border-[#d9e94b]/50 bg-white p-2 text-xs">
        <label class="flex items-center justify-between gap-3">
          <span class="text-slate-600">Keep room visible when only one user remains</span>
          <input id="discoverableToggle" type="checkbox" class="h-4 w-4 accent-[#86b416]" checked>
        </label>
      </div>
    </header>

    <section class="glass-card mb-3">
      <h2 class="text-xs font-semibold uppercase tracking-[0.12em] text-slate-500">Participants</h2>
      <div id="participants" class="mt-2 flex flex-wrap gap-2"></div>
    </section>

    <section id="joinRequestsPanel" class="glass-card mb-3 hidden">
      <h2 class="text-xs font-semibold uppercase tracking-[0.12em] text-slate-500">Join Requests</h2>
      <div id="joinRequests" class="mt-2 space-y-2"></div>
    </section>

    <section class="glass-card flex min-h-0 flex-1 flex-col">
      <div id="messages" class="mb-3 flex-1 space-y-2 overflow-y-auto pr-1"></div>
      <p id="typingIndicator" class="mb-2 min-h-4 text-xs text-[#4c6a0a]"></p>
      <form id="composer" class="mt-auto flex items-end gap-2">
        <div class="flex-1">
          <div id="replyPreview" class="mb-2 hidden rounded-xl border border-[#d9e94b]/70 bg-[#f7ffdb] px-3 py-2">
            <div class="flex items-start justify-between gap-2">
              <div>
                <p id="replyToName" class="text-[11px] font-semibold text-[#395308]"></p>
                <p id="replyToBody" class="text-xs text-slate-600"></p>
              </div>
              <button id="cancelReplyBtn" type="button" class="text-xs font-semibold text-slate-500">Cancel</button>
            </div>
          </div>
        <textarea
          id="messageInput"
          rows="1"
          maxlength="2000"
          class="min-h-[44px] max-h-[140px] flex-1 resize-none rounded-xl border border-[#d9e94b]/60 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-[#a7cd18]"
          placeholder="Type your message"
          required
        ></textarea>
        </div>
        <button class="btn-primary" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script>
    window.CHAT_BOOTSTRAP = {
      roomId: "{{ room_id }}",
      userId: "{{ user_id }}",
      userName: "{{ user_name|escapejs }}"
    };
  </script>
  <script src="{% static 'chatcore/js/room.js' %}"></script>
</body>
</html>
